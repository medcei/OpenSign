services:
  mongo:
    image: 'mongo:6'
    restart: unless-stopped
    volumes:
      - 'mongo-data:/data/db'

  server:
    build:
      context: .
      dockerfile: ./apps/OpenSignServer/Dockerhubfile
    restart: unless-stopped
    depends_on:
      - mongo
    expose:
      - '8080'
    environment:
      PUBLIC_URL: ${PUBLIC_URL}
      SERVER_URL: ${SERVER_URL}
      MONGODB_URI: ${MONGODB_URI}
      MASTER_KEY: ${MASTER_KEY}
      PARSE_MOUNT: ${PARSE_MOUNT}
      APP_ID: ${APP_ID}
      USE_LOCAL: ${USE_LOCAL}
      SMTP_ENABLE: ${SMTP_ENABLE}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_USER_EMAIL: ${SMTP_USER_EMAIL}
      SMTP_PASS: ${SMTP_PASS}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN}
      MAILGUN_SENDER: ${MAILGUN_SENDER}
      PFX_BASE64: ${PFX_BASE64}
      PASS_PHRASE: ${PASS_PHRASE}
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=coolify'
      - 'traefik.http.routers.opensign-api.rule=Host(`api-sign.medcei.com`)'
      - 'traefik.http.routers.opensign-api.entrypoints=https'
      - 'traefik.http.routers.opensign-api.tls=true'
      - 'traefik.http.services.opensign-api.loadbalancer.server.port=8080'
    networks:
      - default
      - coolify

  client:
    build:
      context: .
      dockerfile: ./apps/OpenSign/Dockerhubfile
    restart: unless-stopped
    depends_on:
      - server
    expose:
      - '3000'
    environment:
      PUBLIC_URL: ${PUBLIC_URL}
      REACT_APP_SERVERURL: ${REACT_APP_SERVERURL}
      REACT_APP_APPID: ${REACT_APP_APPID}
      GENERATE_SOURCEMAP: 'false'
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=coolify'
      - 'traefik.http.routers.opensign-web.rule=Host(`sign.medcei.com`)'
      - 'traefik.http.routers.opensign-web.entrypoints=https'
      - 'traefik.http.routers.opensign-web.tls=true'
      - 'traefik.http.services.opensign-web.loadbalancer.server.port=3000'
    networks:
      - default
      - coolify

volumes:
  mongo-data: null

networks:
  coolify:
    external: true
