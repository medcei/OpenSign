services:
  mongo:
    image: 'mongo:6'
    restart: unless-stopped
    volumes:
      - 'mongo-data:/data/db'
  server:
    image: 'opensign/opensignserver:main'
    restart: unless-stopped
    depends_on:
      - mongo
    expose:
      - '8080'
    environment:
      PUBLIC_URL: 'https://sign.medcei.com'
      SERVER_URL: 'https://api-sign.medcei.com/app'
      MONGODB_URI: 'mongodb://mongo:27017/OpenSignDB'
      MASTER_KEY: 9fd4sdf9sdf9sdf9sdf9sdf9
      PARSE_MOUNT: /app
      APP_ID: opensign
      USE_LOCAL: 'true'
      SMTP_ENABLE: 'false'
  client:
    image: 'opensign/opensign:main'
    restart: unless-stopped
    depends_on:
      - server
    expose:
      - '3001'
    environment:
      PUBLIC_URL: 'https://sign.medcei.com'
      REACT_APP_SERVERURL: 'https://api-sign.medcei.com/app'
      REACT_APP_APPID: opensign
      GENERATE_SOURCEMAP: 'false'
volumes:
  mongo-data: null
